name: Deploy to Tencent Cloud CVM

on:
  workflow_run:
    workflows: [Build and push base images]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image names to pull (empty = infra default set)'
        required: false
        default: ''

concurrency:
  group: deploy-tencent-cvm
  cancel-in-progress: false

env:
  REGISTRY: ccr.ccs.tencentyun.com

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve pull commands
        id: images
        run: |
          set -euo pipefail
          NS=$(jq -r '.namespace' images.json)
          DEFAULT="postgres,redis,rabbitmq,kafka,rustfs,imgproxy,gotenberg,nginx,traefik,dbgate,opa,alpine"
          NAMES="${{ inputs.images }}"
          if [[ -z "${NAMES}" ]]; then
            NAMES="${DEFAULT}"
          fi
          SCRIPT=""
          IFS=',' read -ra ARR <<< "${NAMES}"
          for n in "${ARR[@]}"; do
            n="$(echo "${n}" | xargs)"
            tag=$(jq -r --arg name "${n}" '.images[] | select(.name==$name) | .tags[0]' images.json)
            SCRIPT="${SCRIPT}docker pull ${REGISTRY}/${NS}/${n}:${tag}"$'\n'
          done
          echo "namespace=${NS}" >> "${GITHUB_OUTPUT}"
          {
            echo "pull_script<<EOF"
            printf '%s' "${SCRIPT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login and pull on CVM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            REGISTRY="${{ env.REGISTRY }}"
            echo "${{ secrets.TENCENT_REGISTRY_PASSWORD }}" | \
              docker login "${REGISTRY}" \
              --username "${{ secrets.TENCENT_REGISTRY_USERNAME }}" \
              --password-stdin
            ${{ steps.images.outputs.pull_script }}
            docker image prune -f
            echo "Base images updated on $(hostname)"

      - name: Reload infra compose (optional)
        uses: appleboy/ssh-action@v1.2.0
        env:
          COMPOSE_DIR: ${{ vars.DEPLOY_COMPOSE_DIR }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            COMPOSE_DIR="${{ vars.DEPLOY_COMPOSE_DIR }}"
            if [[ -z "${COMPOSE_DIR}" || ! -d "${COMPOSE_DIR}" ]]; then
              echo "DEPLOY_COMPOSE_DIR not set or missing; skip compose reload"
              exit 0
            fi
            cd "${COMPOSE_DIR}"
            docker compose -f docker-compose.infra.yml pull
            docker compose -f docker-compose.infra.yml up -d
